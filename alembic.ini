# Alembic configuration for valocoach.
# Run from the project root — no -c flag needed.

[alembic]
script_location = %(here)s/alembic

# Date-stamped filenames: 20260418_abc123_add_column.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Expose both project root (.) and src/ so `valocoach` is importable
prepend_sys_path = . src

path_separator = os

# Overridden at runtime by env.py via load_settings().
# Kept here so `alembic` doesn't error when settings can't load.
sqlalchemy.url = sqlite:///placeholder.db


[post_write_hooks]
# Auto-fix every generated migration file with ruff
hooks = ruff
ruff.type = module
ruff.module = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
