# ValoCoach RAGAS Evaluation Dataset
#
# Each sample provides a coaching question and a ground-truth reference answer.
# At eval time the pipeline generates `response` and `retrieved_contexts` by
# running run_coach(); these are then scored by RAGAS metrics.
#
# Fields
# ------
#   id           : unique identifier
#   question     : coaching prompt sent to the LLM
#   ground_truth : reference answer used by Context Recall and Faithfulness
#   metadata     : optional filtering tags (agent, map, category)
#
# Run with:  python scripts/run_ragas_eval.py

samples:

  # ----------------------------------------------------------------
  # Agent-specific
  # ----------------------------------------------------------------

  - id: jett_dash_ascent_a
    question: "How should I use Jett's Tailwind to entry A site on Ascent?"
    ground_truth: >
      Activate Tailwind to dash aggressively through A Long, clearing the
      entry corner before enemies can react. Pre-fire the CT-side angle
      immediately after landing.  Combine with Updraft to gain elevation
      and make Jett harder to counter-strafe.
    metadata:
      agent: Jett
      map: Ascent
      category: agent_ability

  - id: omen_smoke_split_b
    question: "Which spots should Omen smoke on a B execute on Split?"
    ground_truth: >
      Omen should use Dark Cover to smoke B Heaven and Mail to cut off
      defenders from the site.  A third smoke on B Back site can prevent
      flank from CT.  Smoke timings matter — throw before entry fraggers
      commit so the smokes land simultaneously with the push.
    metadata:
      agent: Omen
      map: Split
      category: agent_ability

  - id: sage_wall_bind_b
    question: "Where should Sage place her Barrier Orb on Bind B site?"
    ground_truth: >
      A Barrier Orb at B Hookah exit blocks the common angle defenders use
      to hold from that corner.  Alternatively, walling B Long forces
      the defender holding there to reposition, buying time for teammates.
      Do not wall short — it blocks teammate line-of-sight unnecessarily.
    metadata:
      agent: Sage
      map: Bind
      category: agent_ability

  # ----------------------------------------------------------------
  # Economy
  # ----------------------------------------------------------------

  - id: eco_round_pistol_buy
    question: "My team lost the pistol round and has 800 credits. Should we buy or save?"
    ground_truth: >
      With 800 credits after losing the pistol round, the team should save
      (full eco).  Buying Ghosts or Sheriffs rarely yields enough credits
      for a proper rifle buy next round.  A full save means everyone can
      afford rifles in round 3 or earlier if the opponents drop weapons.
    metadata:
      category: economy

  - id: eco_half_buy_threshold
    question: "At what credit threshold should a team consider a half-buy instead of full eco?"
    ground_truth: >
      Teams typically half-buy when they have 2000–2500 credits and cannot
      full-buy.  Spectre + armor is an efficient half-buy.  Below 1800
      credits the half-buy often wastes money on weapons that will not
      be effective enough to swing the round.
    metadata:
      category: economy

  # ----------------------------------------------------------------
  # Tactical / map positioning
  # ----------------------------------------------------------------

  - id: attack_rotation_speed
    question: "How should attackers rotate when B site is taken on Haven?"
    ground_truth: >
      Attackers holding B site on Haven must watch C Link and A Link
      simultaneously to prevent CT and A-spawn rotation.  One player anchors
      the spike plant, two hold rotations.  Rotate decisions should happen
      before 45 seconds so the team has enough time to plant on a new site.
    metadata:
      map: Haven
      category: tactical

  - id: defense_anchor_vs_rotate
    question: "When should a defender anchor a site instead of rotating on Bind?"
    ground_truth: >
      Anchor when you can stall three or more attackers long enough for
      teammates to rotate (roughly 15–20 seconds of delay).  On Bind,
      anchoring B site is easier because the tight angles near Hookah
      favour the defender.  If only two attackers commit, rotating may
      waste the anchor's delay advantage.
    metadata:
      map: Bind
      category: tactical

  # ----------------------------------------------------------------
  # Side-specific
  # ----------------------------------------------------------------

  - id: attack_information_gathering
    question: "What information should attackers gather before committing to a site on Ascent?"
    ground_truth: >
      Attackers should confirm defender positions on Mid (through mid-window
      or B Garden), identify whether A or B is the weaker side, and drain
      any utility such as Sage walls before full committing.  Sending one
      player to poke mid early forces information without over-committing.
    metadata:
      map: Ascent
      category: attack_side

  - id: defense_first_blood_priority
    question: "Why is the first kill so important on defense and how should it be prioritised?"
    ground_truth: >
      A first blood on defense creates a numbers advantage before attackers
      commit utility.  Defenders should prioritize opening picks from
      predictable, off-angle positions rather than holding the exact same
      spot every round.  A 5v4 disadvantage for attackers often forces a
      reset or a desperate execute into a prepared defense.
    metadata:
      category: defense_side

  # ----------------------------------------------------------------
  # Agent-specific (continued)
  # ----------------------------------------------------------------

  - id: killjoy_nanoswarm_ascent_b
    question: "Where should Killjoy place Nanoswarm grenades on Ascent B site?"
    ground_truth: >
      Place Nanoswarm grenades under the default spike plant spot on B site and
      at B Lane to punish planters and retakers. A third grenade near B Market
      window punishes any attempt to hold from that angle. Activate them only
      after the spike is planted — pre-activating wastes charges.
    metadata:
      agent: Killjoy
      map: Ascent
      category: agent_ability

  - id: sova_recon_bolt_bind_b
    question: "What is a reliable Sova Recon Bolt lineup for Bind B site?"
    ground_truth: >
      From B Long, aim at the ceiling above B Hookah to bounce a Recon Bolt
      into site and reveal defenders holding behind boxes. A second bolt thrown
      from B Short with one charge can reveal CT.  Time the bolt reveal with
      the team's B push so defenders cannot reposition before entry.
    metadata:
      agent: Sova
      map: Bind
      category: agent_ability

  - id: reyna_dismiss_after_kill
    question: "When and how should Reyna use Dismiss after getting a kill in a fight?"
    ground_truth: >
      Activate Dismiss immediately after securing a kill to become briefly
      intangible and reposition.  Use it to escape out of a crossfire, retreat
      behind cover, or shift the angle so the remaining enemies have to
      re-acquire Reyna.  Do not Dismiss into the open — pick a safe direction
      first.  Pairing Dismiss with Devour before the next duel fully restores
      health.
    metadata:
      agent: Reyna
      category: agent_ability

  - id: cypher_tripwire_split_b
    question: "Where should Cypher place Trapwires on Split B site?"
    ground_truth: >
      Place one Trapwire at B Alley entrance to catch early pushers and give
      defenders time to react.  A second wire across B Heaven stairs prevents
      flanks from the top.  Avoid placing both wires in obvious spots that
      experienced players will pre-aim and destroy; off-angle wires on the
      side of doorways are harder to spot.
    metadata:
      agent: Cypher
      map: Split
      category: agent_ability

  # ----------------------------------------------------------------
  # Economy (continued)
  # ----------------------------------------------------------------

  - id: eco_bonus_round_strategy
    question: "We just won the pistol round. Should we buy in the bonus round?"
    ground_truth: >
      After winning the pistol round the team can typically afford Spectre
      or Stinger SMGs plus light shields in the bonus round (round 2).
      Full rifles are usually out of range.  Buying SMGs maximises the
      credit advantage from the pistol win without over-investing, and a
      second win can fund a full rifle round thereafter.
    metadata:
      category: economy

  # ----------------------------------------------------------------
  # Tactical (continued)
  # ----------------------------------------------------------------

  - id: spike_plant_timing_decision
    question: "When during the round should attackers decide to plant the spike?"
    ground_truth: >
      Attackers should commit to a plant when they have site control and at
      least 35 seconds on the round timer — enough for defenders to rotate
      but not enough to stall indefinitely.  Planting too early gives
      defenders a long post-plant window; too late risks running out of time.
      Utility expenditure and numbers advantage should both favour the
      attackers before planting.
    metadata:
      category: tactical

  - id: clutch_1v2_post_plant_decisions
    question: "I'm in a 1v2 post-plant situation with the spike planted. What is the best play?"
    ground_truth: >
      In a 1v2 post-plant, take a strong off-angle that covers the spike and
      lets you trade the first kill safely.  Avoid peeking both opponents
      simultaneously — separate them by forcing one to push a different
      angle.  Use remaining utility (flashes, smokes) to isolate each duel.
      If you win the first pick, reset to a new angle before the last
      defender finds your position.
    metadata:
      category: tactical

  - id: defense_retake_coordination_3v3
    question: "How should three defenders coordinate a 3v3 retake on Split A site?"
    ground_truth: >
      Split the retake into two entry angles — two players push from A Heaven
      and one from A Main — so the defenders on site cannot hold both angles
      simultaneously.  Flash or smoke the site before committing to cover the
      entry.  Communicate spike location before entering; the player with the
      best defuse position should move to defuse while teammates trade kills.
    metadata:
      map: Split
      category: tactical

  # ----------------------------------------------------------------
  # Hallucination guards
  # ----------------------------------------------------------------

  - id: no_crossover_ability_names
    question: "How do I use Phoenix's Curveball ability on Ascent A site?"
    ground_truth: >
      Phoenix's Curveball is a curved flash that can be thrown around corners
      to blind enemies holding A site. Flash the CT angle or main entry before
      pushing; the curve allows Phoenix to stay behind cover while activating
      the flash. Combine with Run It Back for aggressive entry where a kill
      resets the ult if Phoenix dies.
    metadata:
      agent: Phoenix
      map: Ascent
      category: hallucination_guard

  - id: no_viper_omen_confusion
    question: "How does Viper use her smokes to block Haven A site?"
    ground_truth: >
      Viper uses Poison Cloud (a placeable canister) to produce a smoke at a
      specific location, and Toxic Screen (a wall of gas) to cut off long
      sightlines.  Both abilities deplete Fuel when active and are toggled
      on and off.  Viper's smokes are not instant-cast like Omen's Dark Cover
      — they require pre-placement and careful Fuel management to maintain
      coverage throughout the round.
    metadata:
      agent: Viper
      map: Haven
      category: hallucination_guard

  - id: no_wrong_map_callouts
    question: "Describe a B site execute on Ascent."
    ground_truth: >
      On Ascent B site, attackers typically push from B Main and B Garden.
      Smoking B Site default and CT spawn cuts off defender angles.  Pushing
      through B Main under smoke while a teammate plays B Garden creates a
      two-pronged entry.  Key callouts on Ascent B are B Main, B Market,
      B Site, and B Garden — not Hookah (Bind) or B Elbow (Split).
    metadata:
      map: Ascent
      category: hallucination_guard
